<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Squircle background -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#232529"/>
      <stop offset="0.45" stop-color="#141519"/>
      <stop offset="1" stop-color="#060709"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="0.5" cy="0.42" r="0.65">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.17"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.035"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Glass fills -->
    <linearGradient id="glassBody" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.42"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.30"/>
    </linearGradient>
    <linearGradient id="glassSweep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="rimLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="squircleRim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="0.25" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="0.85" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.16"/>
    </linearGradient>
    <!-- Blurs -->
    <filter id="blurXL" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="46"/>
    </filter>
    <filter id="blurM" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="blurS" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <clipPath id="squircleClip">
      <rect x="64" y="64" width="896" height="896" rx="204"/>
    </clipPath>
    <clipPath id="hornClip">
      <path d="M 342 448
               C 360 436, 380 430, 398 428
               L 636 348
               C 668 336, 690 352, 690 386
               L 690 638
               C 690 672, 668 688, 636 676
               L 398 596
               C 380 594, 360 588, 342 576
               Z"/>
    </clipPath>
  </defs>

  <!-- ===== Squircle plate ===== -->
  <g clip-path="url(#squircleClip)">
    <rect x="64" y="64" width="896" height="896" fill="url(#bg)"/>
    <rect x="64" y="64" width="896" height="896" fill="url(#bgGlow)"/>

    <!-- big soft glow behind the megaphone -->
    <ellipse cx="512" cy="512" rx="360" ry="320" fill="#ffffff" opacity="0.14" filter="url(#blurXL)"/>

    <!-- ===== Megaphone (tilted up-right) ===== -->
    <g transform="rotate(-16 512 512) translate(512 512) scale(1.14) translate(-524 -512)">

      <!-- glow copy of the horn -->
      <path d="M 398 428 L 636 348 C 668 336, 690 352, 690 386 L 690 638 C 690 672, 668 688, 636 676 L 398 596 Z"
            fill="#ffffff" opacity="0.28" filter="url(#blurM)"/>

      <!-- handle (angled grip, anchored inside the driver) -->
      <g transform="rotate(14 384 560)">
        <rect x="334" y="548" width="100" height="224" rx="46"
              fill="url(#glassBody)" stroke="#ffffff" stroke-opacity="0.35" stroke-width="2.5"/>
        <rect x="349" y="566" width="30" height="188" rx="15" fill="#ffffff" opacity="0.30" filter="url(#blurS)"/>
      </g>

      <!-- rear driver (mouthpiece block) -->
      <g>
        <rect x="318" y="420" width="120" height="184" rx="52"
              fill="url(#glassBody)" stroke="#ffffff" stroke-opacity="0.45" stroke-width="2.5"/>
        <rect x="332" y="434" width="42" height="156" rx="21" fill="#ffffff" opacity="0.35" filter="url(#blurS)"/>
      </g>

      <!-- horn cone -->
      <path d="M 398 428 L 636 348 C 668 336, 690 352, 690 386 L 690 638 C 690 672, 668 688, 636 676 L 398 596 Z"
            fill="url(#glassBody)" stroke="#ffffff" stroke-opacity="0.5" stroke-width="2.5"/>

      <!-- specular sweep across the horn -->
      <g clip-path="url(#hornClip)">
        <rect x="330" y="330" width="380" height="360" fill="url(#glassSweep)" opacity="0.55"/>
        <rect x="300" y="360" width="430" height="64" rx="32" transform="rotate(-19 512 512)"
              fill="#ffffff" opacity="0.30" filter="url(#blurM)"/>
        <rect x="300" y="600" width="430" height="34" rx="17" transform="rotate(-19 512 512)"
              fill="#ffffff" opacity="0.10" filter="url(#blurM)"/>
      </g>

      <!-- top rim highlight of the horn -->
      <path d="M 398 428 L 636 348 C 668 336, 690 352, 690 386"
            fill="none" stroke="url(#rimLight)" stroke-width="4.5" stroke-linecap="round"/>

      <!-- bell lip (front opening) -->
      <ellipse cx="690" cy="512" rx="30" ry="146"
               fill="#ffffff" fill-opacity="0.10"
               stroke="#ffffff" stroke-opacity="0.85" stroke-width="6"/>
      <ellipse cx="690" cy="512" rx="14" ry="122" fill="#ffffff" opacity="0.14" filter="url(#blurS)"/>

      <!-- ===== sound arcs ===== -->
      <g fill="none" stroke-linecap="round">
        <!-- glow copies -->
        <path d="M 764 442 A 96 96 0 0 1 764 582"  stroke="#ffffff" stroke-opacity="0.5"  stroke-width="30" filter="url(#blurM)"/>
        <path d="M 806 398 A 156 156 0 0 1 806 626" stroke="#ffffff" stroke-opacity="0.32" stroke-width="26" filter="url(#blurM)"/>
        <path d="M 848 356 A 218 218 0 0 1 848 668" stroke="#ffffff" stroke-opacity="0.20" stroke-width="22" filter="url(#blurM)"/>
        <!-- crisp arcs -->
        <path d="M 764 442 A 96 96 0 0 1 764 582"  stroke="#ffffff" stroke-opacity="0.92" stroke-width="24"/>
        <path d="M 806 398 A 156 156 0 0 1 806 626" stroke="#ffffff" stroke-opacity="0.60" stroke-width="21"/>
        <path d="M 848 356 A 218 218 0 0 1 848 668" stroke="#ffffff" stroke-opacity="0.34" stroke-width="18"/>
      </g>
    </g>

    <!-- ===== glass pane overlays on the squircle ===== -->
    <!-- top sheen -->
    <path d="M 64 64 L 960 64 L 960 300 C 760 380, 280 380, 64 300 Z"
          fill="#ffffff" opacity="0.045"/>
    <!-- corner speculars -->
    <ellipse cx="240" cy="150" rx="260" ry="90" fill="#ffffff" opacity="0.07" filter="url(#blurXL)"/>
    <ellipse cx="820" cy="900" rx="280" ry="110" fill="#ffffff" opacity="0.05" filter="url(#blurXL)"/>
  </g>

  <!-- squircle glass rim -->
  <rect x="68" y="68" width="888" height="888" rx="200" fill="none"
        stroke="url(#squircleRim)" stroke-width="8"/>
  <rect x="64" y="64" width="896" height="896" rx="204" fill="none"
        stroke="#ffffff" stroke-opacity="0.10" stroke-width="2"/>
</svg>
