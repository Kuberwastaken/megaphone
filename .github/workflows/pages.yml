name: Deploy website

on:
  push:
    branches:
      - main
    paths:
      - "website/**"
      - ".github/scripts/hydrate-website-release.mjs"
      - ".github/workflows/pages.yml"
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Build website with latest release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cp -R website _site
          node .github/scripts/hydrate-website-release.mjs _site

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload website
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
